---
layout: default
---
<section class="page-heading">
  <div class="wrap">
    <p class="eyebrow">{{ page.eyebrow | default: "Portfolio" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.intro %}<p class="lead">{{ page.intro }}</p>{% endif %}
  </div>
</section>

<section class="page-content">
  <div class="wrap prose">
    {{ content }}
  </div>
</section>
